<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phishing Detector (RoBERTa)</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; max-width: 900px; }
    h1 { margin: 0 0 .25rem; }
    .sub { color: #666; margin-bottom: 1rem; }
    .card { border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
    textarea { width: 100%; height: 160px; padding: .75rem; border-radius: 10px; border: 1px solid #ccc; }
    .row { display: flex; gap: .75rem; align-items: center; margin-top: .75rem; }
    button { padding: .65rem 1rem; border: 0; border-radius: 10px; cursor: pointer; background: #111; color: #fff; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 10px; }
    .safe { background: #e8f7ee; }
    .phish { background: #fff1e8; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .muted { color: #757575; font-size: .9rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .badge { background: #eee; border-radius: 999px; padding: .25rem .6rem; font-size: .85rem; }
    .slider { width: 100%; }
  </style>
</head>
<body>
  <h1>Phishing Detector <span class="badge">RoBERTa</span></h1>
  <div class="sub">Paste an email (subject + body) to get a phishing risk verdict.</div>

  <div class="card">
    <label for="emailtext">Email text</label>
    <textarea id="emailtext" placeholder="[Subject] ...&#10;&#10;[Body] ..."></textarea>

    <div class="grid" style="margin-top:.75rem">
      <div>
        <label>Threshold: <span id="threshLabel" class="mono"></span></label>
        <input id="thresh" class="slider" type="range" min="0" max="100" />
      </div>
      <div class="muted">Higher threshold → fewer false alarms, lower threshold → more sensitive.</div>
    </div>

    <div class="row">
      <button id="detectBtn">Detect</button>
      <div id="status" class="muted"></div>
    </div>

    <div id="result" class="result" style="display:none"></div>
  </div>

  <p class="muted" style="margin-top:1rem">This tool is for awareness and triage only—always apply organizational policy before acting.</p>

  <script>
    // Initial threshold from server
    const serverThreshold = {{ threshold }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
